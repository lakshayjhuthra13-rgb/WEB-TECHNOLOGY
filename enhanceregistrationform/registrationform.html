<!doctype html>
<html>
<head>
<title>Enhanced Registration Form</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #ffffff, #000000);
    padding: 20px;
}

/* Form Container */
.container {
    background: white;
    width: 420px;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    margin-bottom: 30px;
}

h1 {
    text-align: center;
    color: #000000;
}

/* Inputs */
input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

input:focus {
    border-color: black;
    box-shadow: 0 0 8px rgba(0,0,0,0.5);
    outline: none;
}

.gender input {
    width: auto;
}

.age-display {
    font-weight: bold;
    margin-left: 10px;
    color: #000000;
}

.submit-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #000000, #ffffff);
    border: none;
    border-radius: 25px;
    font-size: 16px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.submit-btn:hover {
    transform: scale(1.05);
}

/* Attractive Table */
table {
    border-collapse: collapse;
    width: 90%;
    max-width: 900px;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}

th {
    background-color: #000000;
    color: #ffffff;
    padding: 12px;
    font-size: 14px;
}

td {
    padding: 10px;
    text-align: center;
}

tr:nth-child(even) {
    background-color: #f2f2f2;
}

tr:hover {
    background-color: #eaeaea;
    transition: 0.3s;
}

.copy-btn {
    margin-top: 15px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: black;
    color: white;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
<h1>Registration Form</h1>

<form id="regForm">
<label>Full Name *</label>
<input type="text" id="name" required>

<label>Age *</label>
<div style="display:flex; align-items:center;">
<input type="range" min="18" max="30" value="18" id="age" oninput="updateAge(this.value)">
<span id="ageValue" class="age-display">18</span>
</div>

<label>Email *</label>
<input type="email" id="email" required>

<label>Password *</label>
<input type="password" id="password" required>

<label>Telephone *</label>
<input type="tel" id="phone" required>

<label>Date of Birth</label>
<input type="date" id="dob">

<label>Gender *</label>
<div class="gender">
<input type="radio" name="gender" value="Male" required> Male
<input type="radio" name="gender" value="Female"> Female
</div>

<input type="submit" value="Submit" class="submit-btn">
</form>
</div>

<div id="tableContainer"></div>

<script>
function updateAge(value){
    document.getElementById("ageValue").innerText = value;
}

let users = JSON.parse(localStorage.getItem("users")) || [];

document.getElementById("regForm").addEventListener("submit", function(event){
    event.preventDefault();

    let user = {
        name: document.getElementById("name").value,
        age: document.getElementById("age").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        phone: document.getElementById("phone").value,
        dob: document.getElementById("dob").value,
        gender: document.querySelector('input[name="gender"]:checked').value
    };

    users.push(user);
    localStorage.setItem("users", JSON.stringify(users));

    displayTable();
    document.getElementById("regForm").reset();
});

function displayTable(){
    if(users.length === 0){
        document.getElementById("tableContainer").innerHTML = "";
        return;
    }

    let tableHTML = `
    <table id="dataTable">
    <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Email</th>
        <th>Password</th>
        <th>Phone</th>
        <th>DOB</th>
        <th>Gender</th>
    </tr>`;

    users.forEach((user) => {
        tableHTML += `
        <tr>
            <td>${user.name}</td>
            <td>${user.age}</td>
            <td>${user.email}</td>
            <td>${user.password}</td>
            <td>${user.phone}</td>
            <td>${user.dob}</td>
            <td>${user.gender}</td>
        </tr>`;
    });

    tableHTML += `</table>
    <button class="copy-btn" onclick="copyTable()">Copy Table Data</button>`;

    document.getElementById("tableContainer").innerHTML = tableHTML;
}

function copyTable(){
    let tableText = document.getElementById("dataTable").innerText;
    navigator.clipboard.writeText(tableText);
    alert("Table data copied successfully!");
}

displayTable();
</script>

</body>
</html>
